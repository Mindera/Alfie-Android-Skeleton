name: PR Metrics Report

on:
  # Run weekly on Monday at 9:00 AM UTC
  schedule:
    - cron: '0 9 * * 1'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Number of days to look back'
        required: false
        default: '30'

permissions:
  contents: read
  pull-requests: read

jobs:
  generate-metrics:
    name: Generate PR Metrics Report
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Generate PR metrics report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '30' }}
          OUTPUT_FILE: pr-metrics-report.txt
        run: python .github/scripts/pr_metrics.py
        
      - name: Generate markdown report
        run: |
          cat pr-metrics-report.txt > pr-metrics-report.md
          echo "" >> pr-metrics-report.md
          echo "---" >> pr-metrics-report.md
          echo "" >> pr-metrics-report.md
          echo "This report is automatically generated weekly to track PR review activity." >> pr-metrics-report.md
          
      - name: Upload metrics report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pr-metrics-report-${{ github.run_number }}
          path: |
            pr-metrics-report.txt
            pr-metrics-report.md
          retention-days: 90
          
      - name: Create summary
        run: |
          echo "## PR Metrics Report Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat pr-metrics-report.txt >> $GITHUB_STEP_SUMMARY
