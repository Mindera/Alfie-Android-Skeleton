name: Auto Label PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-label:
    name: Auto Label
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@716b1e13042866565e00e85fd4ec490e186c4a2f # v41
        with:
          files_yaml: |
            documentation:
              - '**/*.md'
            ai-config:
              - '.github/copilot/**'
              - '.github/agents/**'
            tests:
              - '**/test/**/*.kt'
              - '**/androidTest/**/*.kt'
              - '**/*Test.kt'
              - '**/*Tests.kt'
            kotlin:
              - '**/*.kt'
              - '**/*.kts'
              
      - name: Add documentation label
        if: steps.changed-files.outputs.documentation_any_changed == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['documentation']
            })
            
      - name: Add ai-config label
        if: steps.changed-files.outputs.ai-config_any_changed == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['ai-config']
            })
            
      - name: Add tests label
        if: steps.changed-files.outputs.tests_any_changed == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['tests']
            })
            
      - name: Add code-change label
        if: steps.changed-files.outputs.kotlin_any_changed == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['code-change']
            })
            
      - name: Check if tiny change
        if: steps.changed-files.outputs.kotlin_any_changed == 'true'
        id: tiny-check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { data: diff } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: context.payload.pull_request.base.sha,
              head: context.payload.pull_request.head.sha
            });
            
            let totalLines = 0;
            for (const file of diff.files || []) {
              if (file.filename.endsWith('.kt') || file.filename.endsWith('.kts')) {
                // file.changes is the sum of additions and deletions
                totalLines += (file.changes || 0);
              }
            }
            
            core.setOutput('is_tiny', totalLines < 10 ? 'true' : 'false');
            
      - name: Add tiny label
        if: steps.tiny-check.outputs.is_tiny == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['tiny']
            })
            
      - name: Check commit author
        id: author-check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            // Check if any commit is from AI (Copilot or other bots)
            const hasAICommit = (commits || []).some(commit => {
              const author = commit.commit?.author;
              if (!author) return false;
              
              const email = (author.email || '').toLowerCase();
              const name = (author.name || '').toLowerCase();
              
              // Check for bot email patterns
              return email.endsWith('copilot@users.noreply.github.com') ||
                     /\[bot\]@users\.noreply\.github\.com$/.test(email) ||
                     email === 'copilot@github.com' ||
                     name.includes('[bot]') ||
                     email.startsWith('github-actions[bot]@');
            });
            
            core.setOutput('is_ai', hasAICommit ? 'true' : 'false');
            
      - name: Add AI label
        if: steps.author-check.outputs.is_ai == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['AI']
            })
            
      - name: Add human label
        if: steps.author-check.outputs.is_ai == 'false'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['human']
            })
