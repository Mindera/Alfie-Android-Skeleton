name: GH Release App

# Trigger on push to tags like v1.2.3 and also manually
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
# Make secrets available from a reusable context
# If you’re using this as a reusable workflow, define them here
# so they can be passed in from calling workflows.
# (Optional if not calling as reusable)
  workflow_call:
    secrets:
      KEYSTORE_BASE64:
        required: false
      KEYSTORE_PASSWORD:
        required: false
      KEY_ALIAS:
        required: false
      KEY_PASSWORD:
        required: false

jobs:
  build-and-release:
    # If you only want to run when a keystore is provided:
    # You can use an expression here, but only allowed inside jobs
    if: secrets.KEYSTORE_BASE64 != ''

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Android Keystore
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release-keystore.jks

      - name: Build Release APK/AAB
        run: |
          ./gradlew clean assembleRelease

      - name: Sign APK/AAB (if keystore)
        if: secrets.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Example signing step, adapt paths if needed
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore release-keystore.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            "$KEY_ALIAS"
          zipalign -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-signed.apk

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact
          path: app/build/outputs/apk/release/*.apk
