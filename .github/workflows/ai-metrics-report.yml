name: Weekly AI Metrics Report

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger for testing

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  generate-metrics-report:
    name: Generate Weekly Metrics Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyGithub pandas

      - name: Generate metrics report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/generate_ai_metrics.py

      - name: Get current date for branch name
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: >-
            docs: weekly AI metrics report for ${{ steps.date.outputs.date }}
          branch: metrics/ai-report-${{ steps.date.outputs.date }}
          delete-branch: true
          title: '📊 Weekly AI Metrics Report - ${{ steps.date.outputs.date }}'
          body-path: metrics/weekly-report.md
          labels: |
            metrics
            documentation
            automated
          assignees: ${{ github.repository_owner }}
