name: Weekly AI Metrics Report

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger for testing

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  generate-metrics-report:
    name: Generate Weekly Metrics Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyGithub pandas

      - name: Generate metrics report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/generate_ai_metrics.py

      - name: Get current date for branch name
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: >-
            docs: weekly AI metrics report for ${{ steps.date.outputs.date }}
          branch: metrics/ai-report-${{ steps.date.outputs.date }}
          delete-branch: true
          title: '📊 Weekly AI Metrics Report - ${{ steps.date.outputs.date }}'
          body-path: metrics/weekly-report.md
          labels: |
            metrics
            documentation
            automated
          assignees: ${{ github.repository_owner }}
